# Example config shipped with mb-pre-commit (see configs/v4). Edit freely; CMake may refresh
# this file on configure unless you disable PRE_COMMIT_INSTALL_EXAMPLE_CONFIG.
# https://pre-commit.com/
minimum_pre_commit_version: '4.0.0'
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files

    # Markdown linting
    # Config file: .markdownlint.yaml
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
    - id: markdownlint

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell

    # CMake linting and formatting
  - repo: https://github.com/BlankSpruce/gersemi
    rev: 0.22.3
    hooks:
    - id: gersemi
      name: CMake linting
      exclude: tests/.*/data/|cmake/mb-pre-commit\.cmake$
